  <script>
    // Digressions live in the right margin on wide screens (always open) and
    // collapse to tap-to-expand <details> on narrow screens (start closed).
    // <details> can't be force-opened with pure CSS across browsers yet, so we
    // sync the `open` state to the breakpoint here. Shared by every page that
    // has a digression; no-ops (empty NodeList) everywhere else.
    (function () {
      var mq = window.matchMedia('(min-width: 1080px)');
      function sync() {
        var nodes = document.querySelectorAll('details.digression');
        for (var i = 0; i < nodes.length; i++) nodes[i].open = mq.matches;
      }
      mq.addEventListener('change', sync);
      sync();
    })();
  </script>

  <script>
    // Subscribe form (end of each post): submit to EmailOctopus in the
    // background and swap in the confirmation line, instead of the redirect
    // to their JSON response a native POST would give. No-ops on pages
    // without the form.
    (function () {
      var form = document.querySelector('.subscribe-form');
      if (!form) return;
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var btn = form.querySelector('.subscribe-btn');
        var msg = form.parentNode.querySelector('.subscribe-msg');
        btn.disabled = true;
        fetch(form.action, { method: 'POST', body: new FormData(form) })
          .then(function (r) { return r.json(); })
          .then(function (r) {
            if (!r.success) throw new Error();
            form.hidden = true;
            msg.textContent = 'You’re in. The next post will land in your inbox.';
            msg.hidden = false;
          })
          .catch(function () {
            msg.textContent = 'That didn’t work — mind trying again?';
            msg.hidden = false;
            btn.disabled = false;
          });
      });
    })();
  </script>

  <!-- GoatCounter — privacy-first pageview counting (no cookies, ~3.5 KB, async,
       so it never competes with rendering). The one deliberate exception to the
       zero-third-party-requests rule; it ignores localhost by default, so dev
       traffic is never counted. Dashboard: https://ajency.goatcounter.com

       Own-view opt-out (per goatcounter.com/help/skip-dev): visit any page with
       #goatcounter-off appended to the URL to stop counting this browser, or
       #goatcounter-on to resume. The flag lives in localStorage, so do it once
       per browser/device that shouldn't be counted.

       Both hashes are idempotent, and the hash is stripped once acted on: a
       toggle would flip twice — and so cancel itself — whenever the browser runs
       the page twice, as it does when it prerenders an address-bar guess. -->
  <script>
    (function () {
      var hash = window.location.hash
      if (hash === '#goatcounter-off' || hash === '#goatcounter-on') {
        if (hash === '#goatcounter-off') localStorage.setItem('skipgc', 't')
        else localStorage.removeItem('skipgc')
        history.replaceState(null, '', window.location.pathname + window.location.search)
        alert(localStorage.getItem('skipgc') === 't'
          ? 'GoatCounter is OFF in this browser — your visits are not counted.'
          : 'GoatCounter is ON in this browser — your visits are counted.')
      }
      if (localStorage.getItem('skipgc') === 't')
        window.goatcounter = {no_onload: true}
    })();
  </script>
  <script data-goatcounter="https://ajency.goatcounter.com/count"
          async src="https://gc.zgo.at/count.js"></script>
